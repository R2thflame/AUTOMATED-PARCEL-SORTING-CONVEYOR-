<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email · Automated Parcel Sorter</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ===== MODERN DESIGN SYSTEM ===== */
        :root {
            --primary-50: #eff6ff;
            --primary-100: #dbeafe;
            --primary-200: #bfdbfe;
            --primary-300: #93c5fd;
            --primary-400: #60a5fa;
            --primary-500: #3b82f6;
            --primary-600: #2563eb;
            --primary-700: #1d4ed8;
            --primary-800: #1e40af;
            --primary-900: #1e3a8a;
            
            --gray-50: #f9fafb;
            --gray-100: #f3f4f6;
            --gray-200: #e5e7eb;
            --gray-300: #d1d5db;
            --gray-400: #9ca3af;
            --gray-500: #6b7280;
            --gray-600: #4b5563;
            --gray-700: #374151;
            --gray-800: #1f2937;
            --gray-900: #111827;
            
            --success: #10b981;
            --success-light: #d1fae5;
            --error: #ef4444;
            --error-light: #fee2e2;
            
            --bg-gradient-start: #f0f5fd;
            --bg-gradient-end: #e8f0fe;
            --card-bg-solid: #ffffff;
            
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.02);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
            
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            --transition-all: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-sans);
            background: linear-gradient(145deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            color: var(--gray-800);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            line-height: 1.5;
        }

        /* Animated background */
        .bg-orb {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            overflow: hidden;
            z-index: -1;
            pointer-events: none;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(59, 130, 246, 0.15), rgba(37, 99, 235, 0.05));
            filter: blur(60px);
            animation: float 20s infinite ease-in-out;
        }

        .orb-1 {
            width: 600px;
            height: 600px;
            top: -200px;
            right: -200px;
            animation-delay: -2s;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            bottom: -150px;
            left: -150px;
            background: radial-gradient(circle, rgba(16, 185, 129, 0.15), rgba(5, 150, 105, 0.03));
            animation-delay: -5s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(2%, 2%) scale(1.02); }
            50% { transform: translate(-1%, 3%) scale(0.98); }
            75% { transform: translate(-2%, -1%) scale(1.01); }
        }

        /* Main container */
        .container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            max-width: 520px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        /* Verify card */
        .verify-card {
            width: 100%;
            background: var(--card-bg-solid);
            border-radius: 32px;
            box-shadow: var(--shadow-xl);
            overflow: hidden;
            animation: fadeInUp 0.6s ease-out;
            position: relative;
        }

        .verify-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary-400), var(--primary-600));
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card-content {
            padding: 2.5rem 2rem;
        }

        /* Back button */
        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--gray-500);
            text-decoration: none;
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
            transition: var(--transition-all);
            cursor: pointer;
            border: none;
            background: none;
        }

        .back-button:hover {
            color: var(--primary-600);
            gap: 0.75rem;
        }

        /* Header */
        .card-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .card-header h2 {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: 0.5rem;
        }

        .card-header p {
            color: var(--gray-500);
            font-size: 0.95rem;
        }

        .user-badge {
            background: var(--primary-50);
            padding: 0.5rem 1rem;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.5rem;
            color: var(--primary-700);
            font-weight: 500;
            font-size: 0.9rem;
        }

        /* Email section */
        .email-section {
            margin: 2rem 0;
            padding: 1.5rem;
            background: var(--gray-50);
            border-radius: 20px;
            border: 1px solid var(--gray-200);
        }

        .email-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            color: var(--gray-700);
            font-weight: 600;
            font-size: 0.95rem;
        }

        .email-header i {
            color: var(--primary-600);
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            color: var(--gray-400);
            font-size: 1rem;
            transition: var(--transition-all);
            pointer-events: none;
        }

        .input-field {
            width: 100%;
            padding: 0.875rem 1rem 0.875rem 2.75rem;
            background: white;
            border: 1px solid var(--gray-200);
            border-radius: 14px;
            font-size: 0.95rem;
            color: var(--gray-800);
            transition: var(--transition-all);
            font-family: var(--font-sans);
        }

        .input-field:focus {
            outline: none;
            border-color: var(--primary-400);
            box-shadow: 0 0 0 4px var(--primary-100);
        }

        .input-field:focus + .input-icon {
            color: var(--primary-600);
        }

        .email-hint {
            display: block;
            margin-top: 0.5rem;
            color: var(--gray-500);
            font-size: 0.8rem;
        }

        .email-hint i {
            color: var(--primary-500);
            margin-right: 0.25rem;
        }

        /* Send code button */
        .send-button {
            width: 100%;
            padding: 1rem;
            margin-top: 1rem;
            background: linear-gradient(135deg, var(--primary-600), var(--primary-700));
            color: white;
            border: none;
            border-radius: 20px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition-all);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.2);
            position: relative;
            overflow: hidden;
        }

        .send-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .send-button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(37, 99, 235, 0.3);
        }

        .send-button:hover:not(:disabled)::before {
            left: 100%;
        }

        .send-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* OTP Section (shown after code is sent) */
        .otp-section {
            margin: 2rem 0;
            display: none;
        }

        .email-display {
            background: var(--primary-50);
            padding: 0.75rem 1rem;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin: 1rem 0;
            color: var(--primary-700);
            font-weight: 500;
            font-size: 0.95rem;
            word-break: break-all;
        }

        .email-display i {
            color: var(--primary-500);
        }

        .otp-grid {
            display: flex;
            gap: 0.75rem;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        .otp-input {
            width: 55px;
            height: 65px;
            text-align: center;
            font-size: 1.8rem;
            font-weight: 600;
            background: var(--gray-50);
            border: 2px solid var(--gray-200);
            border-radius: 16px;
            color: var(--gray-800);
            transition: var(--transition-all);
        }

        .otp-input:focus {
            outline: none;
            border-color: var(--primary-500);
            background: white;
            box-shadow: 0 0 0 4px var(--primary-100);
            transform: scale(1.02);
        }

        .otp-input:valid {
            border-color: var(--primary-300);
            background: white;
        }

        .otp-input::-webkit-inner-spin-button, 
        .otp-input::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        .otp-input {
            -moz-appearance: textfield;
        }

        .timer {
            text-align: center;
            margin: 1rem 0;
            color: var(--gray-500);
            font-size: 0.95rem;
        }

        .timer i {
            color: var(--primary-500);
            margin-right: 0.5rem;
        }

        .timer-warning {
            color: var(--error);
        }

        .verify-button {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--primary-600), var(--primary-700));
            color: white;
            border: none;
            border-radius: 20px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition-all);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            box-shadow: 0 10px 15px -3px rgba(37, 99, 235, 0.2);
        }

        .verify-button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(37, 99, 235, 0.3);
        }

        .verify-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .resend-section {
            text-align: center;
            margin-top: 1.5rem;
        }

        .resend-link {
            color: var(--primary-600);
            text-decoration: none;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
            transition: var(--transition-all);
            cursor: pointer;
            background: none;
            border: none;
            font-size: 0.95rem;
        }

        .resend-link:hover:not(:disabled) {
            color: var(--primary-700);
            gap: 0.5rem;
        }

        .resend-link:disabled {
            color: var(--gray-400);
            cursor: not-allowed;
        }

        /* Messages */
        .message {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 16px;
            display: none;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.95rem;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.error {
            background: var(--error-light);
            color: var(--error);
            border: 1px solid rgba(239, 68, 68, 0.2);
            display: flex;
        }

        .message.success {
            background: var(--success-light);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.2);
            display: flex;
        }

        /* Loading spinner */
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .card-content {
                padding: 2rem 1.25rem;
            }

            .otp-grid {
                gap: 0.5rem;
            }

            .otp-input {
                width: 48px;
                height: 60px;
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="bg-orb">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
    </div>

    <div class="container">
        <div class="verify-card">
            <div class="card-content">
                <button onclick="goBack()" class="back-button">
                    <i class="fas fa-arrow-left"></i>
                    <span>Back to login</span>
                </button>

                <div class="card-header">
                    <h2>Email Verification</h2>
                    <p>Enter your email address to receive OTP</p>
                    <div class="user-badge" id="userBadge">
                        <i class="fas fa-user-check"></i>
                        <span id="usernameDisplay"></span>
                    </div>
                </div>

                <!-- Email Input Section -->
                <div class="email-section" id="emailSection">
                    <div class="email-header">
                        <i class="fas fa-envelope"></i>
                        <span>Email Address</span>
                    </div>

                    <div class="input-wrapper">
                        <i class="fas fa-at input-icon"></i>
                        <input type="email" class="input-field" id="emailInput" placeholder="admin@gmail.com" value="admin@gmail.com" required>
                    </div>
                    <small class="email-hint">
                        <i class="fas fa-info-circle"></i> Use admin@gmail.com for demo
                    </small>

                    <button class="send-button" id="sendOtpButton" onclick="sendOTP()">
                        <span class="loading-spinner" id="otpLoadingSpinner" style="display: none;"></span>
                        <span id="sendOtpText">Send OTP Code</span>
                    </button>
                </div>

                <!-- OTP Verification Section (initially hidden) -->
                <div class="otp-section" id="otpSection">
                    <div class="email-header">
                        <i class="fas fa-lock"></i>
                        <span>Enter Verification Code</span>
                    </div>

                    <div class="email-display" id="emailDisplay">
                        <i class="fas fa-envelope"></i>
                        <span id="displayEmail"></span>
                    </div>

                    <div class="otp-grid" id="otpGrid">
                        <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric">
                        <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric">
                        <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric">
                        <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric">
                        <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric">
                        <input type="text" class="otp-input" maxlength="1" pattern="[0-9]" inputmode="numeric">
                    </div>

                    <div class="timer" id="timer">
                        <i class="far fa-clock"></i>
                        <span id="timerText">Code expires in 05:00</span>
                    </div>

                    <button class="verify-button" id="verifyOtpButton" onclick="verifyOTP()">
                        <span class="loading-spinner" id="verifyLoadingSpinner" style="display: none;"></span>
                        <span id="verifyButtonText">Verify Code</span>
                    </button>

                    <div class="resend-section">
                        <button class="resend-link" id="resendLink" onclick="resendOTP()" disabled>
                            <i class="fas fa-redo-alt"></i>
                            <span>Resend code</span>
                        </button>
                    </div>
                </div>

                <!-- Messages -->
                <div class="message error" id="errorMsg">
                    <i class="fas fa-exclamation-circle"></i>
                    <span id="errorText">An error occurred</span>
                </div>
                
                <div class="message success" id="successMsg">
                    <i class="fas fa-check-circle"></i>
                    <span id="successText">Success!</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // State management
        let currentEmail = '';
        let timeLeft = 300; // 5 minutes in seconds
        let timerInterval = null;
        let canResend = false;
        let resendTimer = null;

        // DOM Elements
        const usernameDisplay = document.getElementById('usernameDisplay');
        const emailInput = document.getElementById('emailInput');
        const sendOtpButton = document.getElementById('sendOtpButton');
        const sendOtpText = document.getElementById('sendOtpText');
        const otpLoadingSpinner = document.getElementById('otpLoadingSpinner');
        const emailSection = document.getElementById('emailSection');
        const otpSection = document.getElementById('otpSection');
        const otpInputs = document.querySelectorAll('.otp-input');
        const verifyOtpButton = document.getElementById('verifyOtpButton');
        const verifyButtonText = document.getElementById('verifyButtonText');
        const verifyLoadingSpinner = document.getElementById('verifyLoadingSpinner');
        const timerText = document.getElementById('timerText');
        const timer = document.getElementById('timer');
        const resendLink = document.getElementById('resendLink');
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');
        const errorText = document.getElementById('errorText');
        const successText = document.getElementById('successText');
        const displayEmail = document.getElementById('displayEmail');

        // Check authentication on load
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const response = await fetch('/auth/status');
                const data = await response.json();
                
                if (!data.authenticated) {
                    window.location.href = '/login';
                    return;
                }
                
                // Get username from session storage or from API
                const username = sessionStorage.getItem('username') || data.user || 'admin';
                usernameDisplay.textContent = `Logged in as: ${username}`;
                
                // Pre-fill email if available
                const savedEmail = sessionStorage.getItem('verifyEmail');
                if (savedEmail) {
                    emailInput.value = savedEmail;
                }
            } catch (error) {
                console.error('Auth check failed:', error);
                window.location.href = '/login';
            }
        });

        // Go back to login
        function goBack() {
            window.location.href = '/login';
        }

        // Send OTP
        async function sendOTP() {
            const email = emailInput.value.trim();
            
            // Basic email validation
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!email || !emailRegex.test(email)) {
                showError('Please enter a valid email address');
                return;
            }

            // Show loading
            otpLoadingSpinner.style.display = 'inline-block';
            sendOtpText.textContent = 'Sending...';
            sendOtpButton.disabled = true;

            try {
                const response = await fetch('/verify', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: email,
                        action: 'send_otp'
                    })
                });

                const data = await response.json();

                if (data.success) {
                    currentEmail = email;
                    sessionStorage.setItem('verifyEmail', email);
                    
                    showSuccess(`OTP sent to ${maskEmail(email)}`);
                    
                    // Switch to OTP section
                    emailSection.style.display = 'none';
                    otpSection.style.display = 'block';
                    displayEmail.textContent = maskEmail(email);
                    
                    // Start timer
                    startTimer();
                    
                    // Enable resend after 60 seconds
                    enableResendAfterDelay();
                    
                    // Focus first OTP input
                    otpInputs[0].focus();
                } else {
                    showError(data.message || 'Failed to send OTP');
                }
            } catch (error) {
                console.error('Send OTP error:', error);
                showError('Connection error. Please try again.');
            } finally {
                otpLoadingSpinner.style.display = 'none';
                sendOtpText.textContent = 'Send OTP Code';
                sendOtpButton.disabled = false;
            }
        }

        // Verify OTP
        async function verifyOTP() {
            // Get OTP from inputs
            let otp = '';
            otpInputs.forEach(input => {
                otp += input.value;
            });

            if (otp.length !== 6) {
                showError('Please enter all 6 digits');
                return;
            }

            if (timeLeft <= 0) {
                showError('Code has expired. Please request a new one.');
                return;
            }

            // Show loading
            verifyLoadingSpinner.style.display = 'inline-block';
            verifyButtonText.textContent = 'Verifying...';
            verifyOtpButton.disabled = true;

            try {
                const response = await fetch('/verify', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: currentEmail,
                        otp: otp,
                        action: 'verify_otp'
                    })
                });

                const data = await response.json();

                if (data.success) {
                    showSuccess('Verification successful! Redirecting...');
                    
                    // Clear timer
                    if (timerInterval) {
                        clearInterval(timerInterval);
                    }
                    
                    // Redirect to dashboard
                    setTimeout(() => {
                        window.location.href = '/dashboard';
                    }, 1500);
                } else {
                    showError(data.message || 'Invalid verification code');
                    clearOtpInputs();
                }
            } catch (error) {
                console.error('Verify OTP error:', error);
                showError('Connection error. Please try again.');
                clearOtpInputs();
            } finally {
                verifyLoadingSpinner.style.display = 'none';
                verifyButtonText.textContent = 'Verify Code';
                verifyOtpButton.disabled = false;
            }
        }

        // Resend OTP
        async function resendOTP() {
            if (!canResend) return;

            const email = currentEmail || emailInput.value.trim();

            resendLink.disabled = true;
            resendLink.innerHTML = '<i class="fas fa-spinner fa-spin"></i><span>Sending...</span>';

            try {
                const response = await fetch('/verify', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email: email,
                        action: 'send_otp'
                    })
                });

                const data = await response.json();

                if (data.success) {
                    showSuccess('New code sent!');
                    
                    // Reset timer
                    timeLeft = 300;
                    startTimer();
                    
                    // Clear OTP inputs
                    clearOtpInputs();
                    
                    // Disable resend again
                    canResend = false;
                    enableResendAfterDelay();
                } else {
                    showError(data.message || 'Failed to resend code');
                }
            } catch (error) {
                console.error('Resend OTP error:', error);
                showError('Connection error. Please try again.');
            } finally {
                resendLink.innerHTML = '<i class="fas fa-redo-alt"></i><span>Resend code</span>';
            }
        }

        // Timer functions
        function startTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
            }
            
            timerInterval = setInterval(() => {
                timeLeft--;
                updateTimer();
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                    verifyOtpButton.disabled = true;
                    timer.classList.add('timer-warning');
                }
            }, 1000);
        }

        function updateTimer() {
            if (timeLeft <= 0) {
                timerText.textContent = 'Code expired';
                return;
            }
            
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            timerText.textContent = `Code expires in ${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            
            if (timeLeft < 60) {
                timer.classList.add('timer-warning');
            } else {
                timer.classList.remove('timer-warning');
            }
        }

        function enableResendAfterDelay() {
            canResend = false;
            resendLink.disabled = true;
            
            if (resendTimer) {
                clearTimeout(resendTimer);
            }
            
            resendTimer = setTimeout(() => {
                canResend = true;
                resendLink.disabled = false;
            }, 60000); // 60 seconds
        }

        // Helper functions
        function maskEmail(email) {
            const [localPart, domain] = email.split('@');
            if (localPart.length <= 3) {
                return `${localPart}***@${domain}`;
            }
            const maskedLocal = localPart.substring(0, 3) + '***' + localPart.substring(localPart.length - 2);
            return `${maskedLocal}@${domain}`;
        }

        function clearOtpInputs() {
            otpInputs.forEach(input => {
                input.value = '';
            });
            otpInputs[0].focus();
        }

        function showError(message) {
            errorText.textContent = message;
            errorMsg.style.display = 'flex';
            successMsg.style.display = 'none';
            
            setTimeout(() => {
                errorMsg.style.display = 'none';
            }, 3000);
        }

        function showSuccess(message) {
            successText.textContent = message;
            successMsg.style.display = 'flex';
            errorMsg.style.display = 'none';
            
            setTimeout(() => {
                successMsg.style.display = 'none';
            }, 3000);
        }

        // OTP input handling
        otpInputs.forEach((input, index) => {
            input.addEventListener('input', function() {
                this.value = this.value.replace(/[^0-9]/g, '');
                if (this.value.length === 1 && index < otpInputs.length - 1) {
                    otpInputs[index + 1].focus();
                }
                
                // Auto-submit when all digits are entered
                const allFilled = Array.from(otpInputs).every(input => input.value.length === 1);
                if (allFilled) {
                    verifyOTP();
                }
            });

            input.addEventListener('keydown', function(e) {
                if (e.key === 'Backspace' && this.value === '' && index > 0) {
                    otpInputs[index - 1].focus();
                }
            });

            input.addEventListener('paste', (e) => {
                e.preventDefault();
                const pasteData = e.clipboardData.getData('text').replace(/[^0-9]/g, '');
                for (let i = 0; i < pasteData.length && i < otpInputs.length; i++) {
                    otpInputs[i].value = pasteData[i];
                    if (i === otpInputs.length - 1) {
                        otpInputs[i].focus();
                    } else {
                        otpInputs[i + 1].focus();
                    }
                }
            });
        });

        // Handle enter key
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && otpSection.style.display === 'block') {
                verifyOTP();
            }
        });

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (timerInterval) {
                clearInterval(timerInterval);
            }
            if (resendTimer) {
                clearTimeout(resendTimer);
            }
        });
    </script>
</body>
</html>
